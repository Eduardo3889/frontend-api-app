services:
  backend:
    build:
      context: ${BACKEND_CONTEXT:-./backend}
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    container_name: projeto-backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - .env
    networks:
      - projeto-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_AUTH_LOGIN_PATH: ${VITE_AUTH_LOGIN_PATH:-/auth/login}
        VITE_AUTH_ME_PATH: ${VITE_AUTH_ME_PATH:-/auth/me}
        VITE_USERS_PATH: ${VITE_USERS_PATH:-/users}
        VITE_ITEMS_PATH: ${VITE_ITEMS_PATH:-/items}
    container_name: projeto-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - projeto-network

networks:
  projeto-network:
    driver: bridge
